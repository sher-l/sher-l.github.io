<form class="site-search-box" action="{{ '/search/' | relative_url }}" method="get">
  <label class="search-label" for="{{ include.id | default: 'site-search-query' }}">
    {{ include.label | default: '站内搜索' }}
  </label>
  <div class="search-inline">
    <input
      id="{{ include.id | default: 'site-search-query' }}"
      class="search-input search-input-compact"
      type="search"
      name="q"
      placeholder="{{ include.placeholder | default: '输入关键词搜索文章、标签和正文' }}"
      autocomplete="off">
    <button class="search-submit" type="submit">搜索</button>
  </div>
  {% if include.hint %}
    <p class="search-hint">{{ include.hint }}</p>
  {% endif %}
</form>
