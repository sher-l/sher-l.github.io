<footer class="site-footer">
  <div class="footer-shell">
    <div>
      <p class="footer-title">{{ site.title }}</p>
      <p class="footer-copy">{{ site.description }}</p>
    </div>
    <div class="footer-meta">
      <a href="{{ '/archive/' | relative_url }}">Archive</a>
      <a href="https://github.com/{{ site.author.github }}" target="_blank" rel="noreferrer">GitHub</a>
      <span>© {{ site.time | date: "%Y" }}</span>
    </div>
  </div>
</footer>
