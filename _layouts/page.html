---
layout: default
---

<article class="page-shell">
  <header class="page-head">
    <p class="page-eyebrow">{{ page.eyebrow | default: page.title }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="page-description">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="page-content">
    {{ content }}
  </div>
</article>
